---
# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Validate with Maven
      run: ./mvnw -B validate --file pom.xml
    # Optional: Uploads the full dependency graph to GitHub to improve the quality of Dependabot alerts this repository can receive
    - name: Update dependency graph
      continue-on-error: true
      uses: advanced-security/maven-dependency-submission-action@v5

  test:
    runs-on: ubuntu-latest
    needs: validate

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run unit tests
      run: ./mvnw -B test --file pom.xml
    - name: Generate test report
      run: ./mvnw -B surefire-report:report-only
    - name: Upload test report
      uses: actions/upload-artifact@v4
      with:
        name: surefire-report
        path: target/reports/

  uber-jar:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build uber-jar
      run: ./mvnw -B package -Dquarkus.package.jar.type=uber-jar --file pom.xml
    - name: Upload uber-jar artifact
      uses: actions/upload-artifact@v4
      with:
        name: trino-query-formatter-uber-jar
        path: target/*-runner.jar

  container-tests:
    runs-on: ubuntu-latest
    needs: test

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run container-backed integration tests
      run: ./mvnw -B test -Pcontainer-tests --file pom.xml
    - name: Generate container test report
      run: ./mvnw -B surefire-report:report-only
    - name: Upload container test report
      uses: actions/upload-artifact@v4
      with:
        name: surefire-report-container
        path: target/reports/
