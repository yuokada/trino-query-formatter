---
name: Native Release Assets

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-native:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6

    - name: Set up GraalVM (Java 17)
      uses: graalvm/setup-graalvm@v1
      with:
        distribution: graalvm-community
        java-version: '17'
        cache: maven
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build native binary
      run: ./mvnw -B package -Dnative -DskipTests --file pom.xml

    - name: Prepare native artifact
      run: |
        mkdir -p dist
        cp target/*-runner dist/trino-query-formatter-${{ runner.os }}-${{ runner.arch }}

    - name: Upload native artifact
      uses: actions/upload-artifact@v4
      with:
        name: native-${{ runner.os }}-${{ runner.arch }}
        path: dist/*

  attach-to-release:
    needs: build-native
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - name: Download all native artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        merge-multiple: true

    - name: Attach binaries to release
      run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
