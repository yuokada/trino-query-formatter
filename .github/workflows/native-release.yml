---
name: Native Release Assets

on:
  push:
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Validate with Maven
      run: ./mvnw -B validate --file pom.xml

  test:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run tests
      run: ./mvnw -B test --file pom.xml

  build-native:
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v7

    - name: Set up GraalVM (Java 17)
      uses: graalvm/setup-graalvm@v1
      with:
        distribution: graalvm-community
        java-version: '17'
        cache: maven
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build native binary
      run: ./mvnw -B package -Dnative -DskipTests --file pom.xml

    - name: Prepare native artifact
      run: |
        mkdir -p dist
        cp target/*-runner dist/trino-query-formatter-${{ runner.os }}-${{ runner.arch }}

    - name: Upload native artifact
      uses: actions/upload-artifact@v7
      with:
        name: native-${{ runner.os }}-${{ runner.arch }}
        path: dist/*

  attach-to-release:
    needs: build-native
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
    - name: Download all native artifacts
      uses: actions/download-artifact@v8
      with:
        path: dist
        merge-multiple: true

    - name: Attach binaries to release
      run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
