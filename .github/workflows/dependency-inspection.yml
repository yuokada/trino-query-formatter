---
name: Dependency Inspection

on:
  workflow_dispatch:

jobs:
  dependency-inspection:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Generate dependency reports
      run: |
        mkdir -p target/reports
        ./mvnw -B dependency:list > target/reports/dependency-list.txt
        ./mvnw -B dependency:tree > target/reports/dependency-tree.txt
    - name: Upload dependency reports
      uses: actions/upload-artifact@v4
      with:
        name: dependency-reports
        path: target/reports/dependency-*.txt
