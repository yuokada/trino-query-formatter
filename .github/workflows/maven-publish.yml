---
# This workflow will build a package using Maven and then publish it to GitHub packages when a release is created
# For more information see: https://github.com/actions/setup-java/blob/main/docs/advanced-usage.md#apache-maven-with-a-settings-path

name: Maven Package

# see: https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows
on:
  push:
    tags:
      - v*
jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Validate with Maven
      run: ./mvnw -B validate --file pom.xml

  test:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Run tests
      run: ./mvnw -B test --file pom.xml

  build:
    needs: test

    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'
        server-id: github # Value of the distributionManagement/repository/id field of the pom.xml
        settings-path: ${{ github.workspace }} # location for the settings.xml file

    - name: Build with Maven
      run: ./mvnw -B package --file pom.xml

    - name: Detect project version
      id: project-version
      run: echo "value=$(./mvnw -q -DforceStdout help:evaluate -Dexpression=project.version)" >> "$GITHUB_OUTPUT"

    - name: Publish to GitHub Packages Apache Maven
      if: ${{ !contains(steps.project-version.outputs.value, 'SNAPSHOT') }}
      run: ./mvnw deploy -s $GITHUB_WORKSPACE/settings.xml
      env:
        GITHUB_TOKEN: ${{ github.token }}
